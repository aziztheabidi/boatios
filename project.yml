name: BoatSharingApp
options:
  bundleIdPrefix: com.boatit
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  Alamofire:
    url: https://github.com/Alamofire/Alamofire.git
    from: 5.8.0
  GoogleMaps:
    url: https://github.com/googlemaps/ios-maps-sdk
    from: 10.13.0
  Stripe:
    url: https://github.com/stripe/stripe-ios-spm
    from: 24.0.0
  SDWebImageSwiftUI:
    url: https://github.com/SDWebImage/SDWebImageSwiftUI.git
    from: 3.0.0

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  BoatSharingApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BoatSharingApp
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseMessaging
      - package: Firebase
        product: FirebaseFirestore
      - package: Alamofire
        product: Alamofire
      - package: GoogleMaps
        product: GoogleMaps
      - package: Stripe
        product: Stripe
      - package: Stripe
        product: StripePaymentSheet
      - package: SDWebImageSwiftUI
        product: SDWebImageSwiftUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boatit.BoatSharingApp
        INFOPLIST_FILE: BoatSharingApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: BoatSharingApp/BoatSharingApp.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: BoatIT
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: BoatIT uses your location to show nearby docks and voyages.
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: BoatIT uses your location in the background when a voyage is active.
        INFOPLIST_KEY_UIUserInterfaceStyle: Light

  BoatSharingAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BoatSharingAppTests
    dependencies:
      - target: BoatSharingApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boatit.BoatSharingAppTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"

schemes:
  BoatSharingApp:
    build:
      targets:
        BoatSharingApp: all
        BoatSharingAppTests: [test]
    test:
      targets:
        - BoatSharingAppTests
